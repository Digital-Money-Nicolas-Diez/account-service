spring:
  application:
    name: accounts
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/DH_BACKEND
  datasource:
    url: jdbc:postgresql://localhost:5432/app_db?options=-c%20TimeZone=UTC
    username: app_user
    password: app_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # update SOLO para dev
    show-sql: true
    properties:
      hibernate:
        '[default_schema]': digital_money
        '[format_sql]': true
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8082
